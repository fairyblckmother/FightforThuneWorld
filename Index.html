<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Battle For ThuneWorld</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
    padding: 6px 12px;
    font-size: 13px;
    letter-spacing: 2px;
  }
  .p-lives { color: #00ff88; text-shadow: 0 0 8px #00ff88; }
  .score   { color: #ffcc00; text-shadow: 0 0 8px #ffcc00; }
  .e-lives { color: #ff6600; text-shadow: 0 0 8px #ff6600; }
  canvas {
    display: block;
    border: 1px solid #003322;
    box-shadow: 0 0 24px #00ff4420;
  }
  #controls {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 10px 12px;
    width: 100%;
    max-width: 480px;
  }
  .btn {
    background: #001a0d;
    border: 1px solid #00ff8866;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    font-size: 20px;
    padding: 14px 0;
    border-radius: 4px;
    cursor: pointer;
    text-align: center;
    text-shadow: 0 0 6px #00ff88;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: #003322; }
  .btn.fire { border-color: #ff444488; color: #ff4444; text-shadow: 0 0 6px #ff4444; background: #1a0000; }
  .btn.fire:active { background: #330000; }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
  }
  #overlay h1 {
    color: #00ff88;
    font-size: 26px;
    letter-spacing: 6px;
    text-shadow: 0 0 20px #00ff88;
  }
  #overlay p {
    color: #007744;
    font-size: 12px;
    letter-spacing: 2px;
    text-align: center;
    line-height: 2.2;
  }
  #resultText {
    font-size: 18px;
    color: #ffcc00;
    text-shadow: 0 0 12px #ffcc00;
    letter-spacing: 3px;
    min-height: 28px;
  }
  #startBtn {
    background: #001a0d;
    border: 1px solid #00ff88;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 12px 28px;
    cursor: pointer;
    text-shadow: 0 0 8px #00ff88;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="p-lives" id="pLives">YOU: ♦♦♦</div>
  <div class="score"   id="scoreEl">0</div>
  <div class="e-lives" id="eLives">♦♦♦ :FOE</div>
</div>

<canvas id="c"></canvas>

<div id="controls">
  <button class="btn"      id="bL">◁</button>
  <button class="btn"      id="bT">△</button>
  <button class="btn"      id="bR">▷</button>
  <button class="btn fire" id="bF">✦</button>
</div>

<script>
(function() {
  var canvas = document.getElementById('c');
  var ctx    = canvas.getContext('2d');
  var W, H;

  function resize() {
    var maxW = Math.min(window.innerWidth, 480);
    var maxH = window.innerHeight - 140;
    var size = Math.min(maxW, maxH, 480);
    canvas.width  = size;
    canvas.height = size;
    W = H = size;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Stars ──────────────────────────────────────────────────────
  var stars = [];
  for (var i = 0; i < 70; i++) {
    stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.2 + 0.3, a: Math.random() * 0.5 + 0.4 });
  }

  // ── Game vars ──────────────────────────────────────────────────
  var score = 0;
  var running = false;
  var rafId = 0;
  var particles = [];

  var keys = { left: false, right: false, thrust: false, fire: false };

  // ── Torpedo pool ───────────────────────────────────────────────
  function makeTorp(x, y, vx, vy) {
    return { x: x, y: y, vx: vx, vy: vy, life: 65 };
  }

  // ── Ship factory ───────────────────────────────────────────────
  function makeShip(isPlayer) {
    return {
      isPlayer: isPlayer,
      x: 0, y: 0, vx: 0, vy: 0,
      angle: 0,
      lives: 3,
      torps: [],
      cooldown: 0,
      invincible: 0,
      thrusting: false
    };
  }

  var player = makeShip(true);
  var enemy  = makeShip(false);

  function resetShip(s) {
    var cx = W / 2, cy = H / 2;
    var r  = W * 0.27;
    if (s.isPlayer) {
      s.x = cx - r; s.y = cy; s.angle = 0;
    } else {
      s.x = cx + r; s.y = cy; s.angle = Math.PI;
    }
    s.vx = 0; s.vy = 0;
    s.thrusting  = false;
    s.invincible = 110;
    s.torps      = [];
  }

  // ── Particles ──────────────────────────────────────────────────
  function explode(x, y, col) {
    for (var i = 0; i < 16; i++) {
      var a = Math.random() * Math.PI * 2;
      var spd = Math.random() * 2.5 + 0.5;
      particles.push({ x: x, y: y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 45, max: 45, col: col });
    }
  }

  // ── Ship update ────────────────────────────────────────────────
  function updateShip(s) {
    // Gravity
    var dx = W/2 - s.x, dy = H/2 - s.y;
    var dist = Math.sqrt(dx*dx + dy*dy) || 1;
    var safeDist = Math.max(dist, 60);
    var g = 0.4 / (safeDist * safeDist) * 800;
    s.vx += (dx/dist) * g;
    s.vy += (dy/dist) * g;

    // Speed cap
    var spd = Math.sqrt(s.vx*s.vx + s.vy*s.vy);
    if (spd > 4.8) { s.vx = s.vx/spd*4.8; s.vy = s.vy/spd*4.8; }

    s.x += s.vx; s.y += s.vy;

    // Wrap
    if (s.x < 0) s.x += W; if (s.x > W) s.x -= W;
    if (s.y < 0) s.y += H; if (s.y > H) s.y -= H;

    if (s.cooldown  > 0) s.cooldown--;
    if (s.invincible> 0) s.invincible--;

    // Update torpedoes
    var alive = [];
    for (var i = 0; i < s.torps.length; i++) {
      var t = s.torps[i];
      t.x += t.vx; t.y += t.vy; t.life--;
      if (t.x < 0) t.x += W; if (t.x > W) t.x -= W;
      if (t.y < 0) t.y += H; if (t.y > H) t.y -= H;
      if (t.life > 0) alive.push(t);
    }
    s.torps = alive;
  }

  function thrustShip(s) {
    s.vx += Math.cos(s.angle) * 0.11;
    s.vy += Math.sin(s.angle) * 0.11;
  }

  function fireShip(s) {
    if (s.cooldown > 0) return;
    var spd = 5.2;
    s.torps.push(makeTorp(
      s.x + Math.cos(s.angle)*13,
      s.y + Math.sin(s.angle)*13,
      s.vx + Math.cos(s.angle)*spd,
      s.vy + Math.sin(s.angle)*spd
    ));
    s.cooldown = 20;
  }

  // ── Draw ship ─────────────────────────────────────────────────
  function drawShip(s, col) {
    if (s.invincible > 0 && Math.floor(s.invincible/5) % 2 === 0) return;

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);
    ctx.shadowBlur = 10; ctx.shadowColor = col;
    ctx.strokeStyle = col; ctx.lineWidth = 1.6;

    ctx.beginPath();
    if (s.isPlayer) {
      ctx.moveTo(12, 0); ctx.lineTo(-8,-7); ctx.lineTo(-4,0); ctx.lineTo(-8,7); ctx.closePath();
    } else {
      ctx.moveTo(-12,0); ctx.lineTo(8,-6); ctx.lineTo(4,0); ctx.lineTo(8,6); ctx.closePath();
    }
    ctx.stroke();

    if (s.thrusting) {
      ctx.strokeStyle = '#ff7700'; ctx.shadowColor = '#ff7700'; ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(-4,-2); ctx.lineTo(-12 - Math.random()*7, 0); ctx.lineTo(-4,2);
      ctx.stroke();
    }
    ctx.restore();

    // Torpedoes
    for (var i = 0; i < s.torps.length; i++) {
      var t = s.torps[i];
      ctx.save();
      ctx.shadowBlur = 7; ctx.shadowColor = col; ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(t.x, t.y, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // ── Hit detection ──────────────────────────────────────────────
  function checkHit(victim, shooter) {
    if (victim.invincible > 0) return false;
    for (var i = 0; i < shooter.torps.length; i++) {
      var t = shooter.torps[i];
      var dx = t.x - victim.x, dy = t.y - victim.y;
      if (dx*dx + dy*dy < 196) { // 14px radius
        shooter.torps.splice(i, 1);
        return true;
      }
    }
    return false;
  }

  function nearStar(s) {
    var dx = s.x - W/2, dy = s.y - H/2;
    return dx*dx + dy*dy < 324; // 18px radius
  }

  // ── AI ────────────────────────────────────────────────────────
  function aiThink() {
    var dx = player.x - enemy.x, dy = player.y - enemy.y;
    var dist = Math.sqrt(dx*dx + dy*dy) || 1;
    var target = Math.atan2(dy, dx) + Math.PI;

    var diff = target - enemy.angle;
    while (diff >  Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;

    if      (diff >  0.07) enemy.angle += 0.045;
    else if (diff < -0.07) enemy.angle -= 0.045;

    // Steer away from star if too close
    var ex = enemy.x - W/2, ey = enemy.y - H/2;
    var eDist = Math.sqrt(ex*ex + ey*ey);
    if (eDist < W * 0.22) {
      var awayAngle = Math.atan2(ey, ex);
      var awayDiff = awayAngle - enemy.angle;
      while (awayDiff >  Math.PI) awayDiff -= Math.PI*2;
      while (awayDiff < -Math.PI) awayDiff += Math.PI*2;
      if (awayDiff > 0) enemy.angle += 0.07;
      else              enemy.angle -= 0.07;
      enemy.thrusting = true;
      thrustShip(enemy);
    } else {
      enemy.thrusting = dist > W * 0.44;
      if (enemy.thrusting) thrustShip(enemy);
    }

    // Fire from the nose (opposite end for enemy)
    if (Math.abs(diff) < 0.28 && dist < W * 0.58 && Math.random() < 0.035 && enemy.cooldown <= 0) {
      var fa = enemy.angle + Math.PI;
      var spd = 5.2;
      enemy.torps.push(makeTorp(
        enemy.x + Math.cos(fa)*13, enemy.y + Math.sin(fa)*13,
        enemy.vx + Math.cos(fa)*spd, enemy.vy + Math.sin(fa)*spd
      ));
      enemy.cooldown = 24;
    }
  }

  // ── HUD ───────────────────────────────────────────────────────
  function updateHUD() {
    document.getElementById('pLives').textContent  = 'YOU: ' + '♦'.repeat(Math.max(0, player.lives));
    document.getElementById('eLives').textContent  = '♦'.repeat(Math.max(0, enemy.lives))  + ' :FOE';
    document.getElementById('scoreEl').textContent = score;
  }

  // ── Draw star ─────────────────────────────────────────────────
  function drawStar() {
    var cx = W/2, cy = H/2;
    var g = ctx.createRadialGradient(cx, cy, 2, cx, cy, 22);
    g.addColorStop(0,   '#ffffff');
    g.addColorStop(0.25,'#ffee88');
    g.addColorStop(0.6, 'rgba(255,80,0,0.2)');
    g.addColorStop(1,   'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI*2); ctx.fill();

    ctx.shadowBlur = 18; ctx.shadowColor = '#ffcc44';
    ctx.fillStyle  = '#fffbdd';
    ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ── Game loop ─────────────────────────────────────────────────
  function loop() {
    if (!running) return;
    rafId = requestAnimationFrame(loop);

    // Clear
    ctx.fillStyle = '#00030a';
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      ctx.globalAlpha = s.a;
      ctx.fillStyle = '#aaddcc';
      ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawStar();

    // Player input
    if (keys.left)   player.angle -= 0.065;
    if (keys.right)  player.angle += 0.065;
    player.thrusting = keys.thrust;
    if (keys.thrust) thrustShip(player);
    if (keys.fire)   fireShip(player);

    // AI
    aiThink();

    // Update
    updateShip(player);
    updateShip(enemy);

    // Particles
    var alive = [];
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      var a = p.life / p.max;
      var r = Math.max(0.1, 2 * a);
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
      if (p.life > 0) alive.push(p);
    }
    ctx.globalAlpha = 1;
    particles = alive;

    // Draw
    drawShip(player, '#00ff88');
    drawShip(enemy,  '#ff6600');

    // Collision checks
    if (!player.invincible && (checkHit(player, enemy) || nearStar(player))) {
      explode(player.x, player.y, '#00ff88');
      player.lives--;
      updateHUD();
      if (player.lives <= 0) { endGame('SHIP DESTROYED'); return; }
      resetShip(player);
    }

    if (!enemy.invincible && (checkHit(enemy, player) || nearStar(enemy))) {
      explode(enemy.x, enemy.y, '#ff6600');
      enemy.lives--;
      score += 100;
      updateHUD();
      if (enemy.lives <= 0) { endGame('ENEMY ELIMINATED'); return; }
      resetShip(enemy);
    }

    // CRT scanlines
    ctx.fillStyle = 'rgba(0,0,0,0.03)';
    for (var y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
  }

  // ── Start / End ───────────────────────────────────────────────
  function startGame() {
    score = 0; particles = [];
    player.lives = 3; enemy.lives = 3;
    resetShip(player); resetShip(enemy);
    updateHUD();
    document.getElementById('overlay').style.display = 'none';
    running = true;
    loop();
  }

  function endGame(msg) {
    running = false;
    cancelAnimationFrame(rafId);
    document.getElementById('resultText').textContent = msg;
    document.getElementById('startBtn').textContent   = '[ PLAY AGAIN ]';
    document.getElementById('overlay').style.display  = 'flex';
  }

  // ── Button bindings ───────────────────────────────────────────
  function bindBtn(id, key) {
    var el = document.getElementById(id);
    el.addEventListener('touchstart', function(e) { e.preventDefault(); keys[key] = true;  }, { passive: false });
    el.addEventListener('touchend',   function(e) { e.preventDefault(); keys[key] = false; }, { passive: false });
    el.addEventListener('mousedown',  function()  { keys[key] = true;  });
    el.addEventListener('mouseup',    function()  { keys[key] = false; });
    el.addEventListener('mouseleave', function()  { keys[key] = false; });
  }
  bindBtn('bL', 'left');
  bindBtn('bT', 'thrust');
  bindBtn('bR', 'right');
  bindBtn('bF', 'fire');

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft')  keys.left   = true;
    if (e.key === 'ArrowRight') keys.right  = true;
    if (e.key === 'ArrowUp')    keys.thrust = true;
    if (e.key === ' ')          keys.fire   = true;
  });
  document.addEventListener('keyup', function(e) {
    if (e.key === 'ArrowLeft')  keys.left   = false;
    if (e.key === 'ArrowRight') keys.right  = false;
    if (e.key === 'ArrowUp')    keys.thrust = false;
    if (e.key === ' ')          keys.fire   = false;
  });

  document.getElementById('startBtn').addEventListener('click', startGame);
})();
</script>
</body>
</html>
